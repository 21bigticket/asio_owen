# CORS (cross-origin) policy.
#
# This file is OPTIONAL. If it is absent, or enabled=false, the gateway adds no
# Access-Control-* headers and does not answer preflight requests locally, so
# the browser same-origin policy applies (the industry-standard default).
#
# Set enabled=true to turn CORS on for the whitelisted origins below.

[cors]
enabled = false

# Comma-separated exact origins. A single "*" allows all origins.
# When allow_credentials=true, "*" is echoed back as the concrete Origin
# (the wildcard is illegal together with credentials).
allowed_origins = https://app.example.com, https://admin.example.com

# Methods / headers advertised on preflight responses.
allowed_methods = GET, POST, PUT, DELETE, OPTIONS
# allowed_headers is only a FALLBACK: when a preflight declares
# Access-Control-Request-Headers the gateway echoes that list back (matching
# nginx/Envoy defaults), so this value applies only when the browser requests
# no specific headers. It is not a hard whitelist; header enforcement is done
# browser-side.
allowed_headers = Content-Type, Authorization

# Response headers exposed to browser JS (optional, empty = none).
expose_headers =

# Allow cookies / Authorization to be sent cross-origin.
allow_credentials = false

# Preflight cache lifetime in seconds.
max_age = 600
