[server]
port = 8081
log_level = INFO
log_file = server.log

[mysql]
host = 127.0.0.1
port = 3306
user = root
pass = Klzz_20200528
db = zebra_config
min_size = 8
max_size = 64
max_idle_sec = 60
connect_timeout_ms = 1000
read_timeout_ms = 500
keepalive_sec = 30
worker_threads = 32

[redis]
host = 127.0.0.1
port = 6379
connect_timeout_ms = 1000
cmd_timeout_ms = 500

[http_pool]
max_size = 5120
max_concurrent = 0
max_body_size = 10485760
connect_timeout_ms = 1000
read_timeout_ms = 5000
request_timeout_ms = 5000
idle_timeout_sec = 60

[upstream]
# service_name = host:port, gateway routes via /{service_name}/...
# example: /zebra-config/xxx -> 127.0.0.1:30001
zebra-config = 127.0.0.1:30001
zebra-member = 127.0.0.1:30003
zebra-goods = 127.0.0.1:30006
zebra-order = 127.0.0.1:30009

[trusted_proxies]
# trusted proxy IP list (XFF parsing skips these from right to left)
# production: list specific LB/reverse-proxy IPs, not CIDR ranges

[ip_blacklist]
# format: ip = specific IP

[auth_whitelist]
# auth-free paths (exact) or path/ (prefix match), or service name
# example: /api/health, /api/public/, zebra-public

[path_blacklist]
# format: /path or /path/ = role:admin

[security]
# JWT verification config
jwt_secret =
jwt_issuer = asio_owen
jwt_algorithm = HS256
config_reload_interval_sec = 30
case_sensitive_paths = false   # false=lowercase paths for ACL matching (more secure), true=preserve original case

[rate_limit]
# rate limit config
ip_rps = 0
ip_burst = 0
global_rps = 0
max_buckets = 100000
snapshot_interval_sec = 30
snapshot_path = /var/lib/asio_owen/rate_limit.bin
