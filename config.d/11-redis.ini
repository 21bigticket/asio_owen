# ============================================================================
# 2. 数据库 — Redis 连接池（重启生效）
# ============================================================================
[redis]
host = 127.0.0.1
port = 6379
db = 0
connect_timeout_ms = 1000
cmd_timeout_ms = 500
mode = direct

# worker mode only; ignored when mode = direct
min_size = 4
max_size = 32
max_idle_sec = 120
worker_threads = 16
max_creating = 0
acquire_timeout_ms = 3000
