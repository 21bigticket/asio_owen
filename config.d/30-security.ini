# ============================================================================
# 5. 安全 — JWT / 路径大小写（重启生效，密钥轮换需重启）
# ============================================================================
# HS256: set jwt_secret to a key >= 32 bytes
# RS256: set jwt_secret to non-empty + jwt_algorithm=RS256 + either:
#   a) jwt_public_key = /path/to/public-key.pem
#   b) jwt_rsa_n + jwt_rsa_e (JWKS-style base64url)
[security]
jwt_secret = pixiu-gateway-jwt
jwt_issuer = pixiu-gateway
jwt_algorithm = RS256
jwt_public_key = jwt_keys/public-key.pem
jwt_rsa_n =
jwt_rsa_e =
config_reload_interval_sec = 30
case_sensitive_paths = false
