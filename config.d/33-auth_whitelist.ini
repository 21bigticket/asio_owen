# ============================================================================
# 8. 安全 — 免鉴权白名单（定时器热加载）
# ============================================================================
# exact path:  path = /api/health
# prefix path: path = /api/public/
# service:     zebra-public
# ============================================================================
[auth_whitelist]
path = /api/health
path = /api/build
path = /api/redis
path = /api/mysql
path = /api/combo
path = /zebra-passport/captcha.CaptchaService/GetCaptcha
path = /zebra-passport/user_auth.UserAuthService/GetPublicKey
path = /zebra-passport/user_auth.UserAuthService/Login
path = /zebra-config/config.ConfigService/GetByAppAndKey
